<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issy – Smart Planning Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --card: #161b2e;
    --border: #1f2a45;
    --accent: #4f8fff;
    --accent2: #7c5fff;
    --green: #2dcc8e;
    --amber: #ffb847;
    --text: #e8edf7;
    --muted: #5a6a8a;
    --issy-bubble: #161f3a;
    --user-bubble: #1a2a5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    flex-shrink: 0;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.5;
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    position: relative; flex-shrink: 0;
  }

  .avatar-pulse {
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: pulse 2s ease-in-out infinite;
    opacity: 0.6;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.12); opacity: 0.2; }
  }

  .header-info h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }

  .header-info .status {
    font-size: 11px; color: var(--green);
    display: flex; align-items: center; gap: 5px; font-weight: 400;
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }

  .sound-toggle {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: border-color 0.2s, color 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .sound-toggle.on { border-color: var(--accent); color: var(--accent); }

  .demo-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: white;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .demo-btn:hover { opacity: 0.9; transform: scale(1.03); }
  .demo-btn .btn-icon { font-size: 10px; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 20px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; gap: 10px;
    max-width: 78%;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .msg.visible { opacity: 1; transform: translateY(0); }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg.issy .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: var(--border); font-size: 14px; }

  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.6; position: relative;
  }
  .msg.issy .bubble {
    background: var(--issy-bubble); border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--user-bubble); border: 1px solid #253a7a;
    border-top-right-radius: 4px;
  }

  /* Choice buttons inside bubble */
  .choice-group {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .choice-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    cursor: default;
    white-space: nowrap;
    transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
  }
  .choice-chip.hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,143,255,0.10);
    transform: scale(1.04);
  }
  .choice-chip.clicking {
    transform: scale(0.95);
    border-color: var(--green);
    color: var(--green);
    background: rgba(45,204,142,0.15);
    box-shadow: 0 0 0 3px rgba(45,204,142,0.18);
  }
  .choice-chip.selected {
    border-color: var(--green);
    color: var(--green);
    background: rgba(45,204,142,0.08);
  }

  /* Thinking dots */
  .thinking { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
  .thinking span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Input area ── */
  .input-area {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }

  .input-box {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13.5px;
    font-family: 'Sora', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-box:focus { border-color: var(--accent); }

  .send-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: transform 0.15s;
  }
  .send-btn:hover { transform: scale(1.05); }

  /* ── Action log ── */
  .action-log {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 16px 10px;
    height: 120px;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .action-log::-webkit-scrollbar { width: 3px; }
  .action-log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-toolbar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; flex-shrink: 0;
  }

  .log-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px; flex: 1;
  }
  .log-label::before {
    content: ''; width: 3px; height: 3px; border-radius: 50%;
    background: var(--accent);
  }

  .save-log-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 9px;
    font-size: 10px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .save-log-btn:hover { border-color: var(--accent); color: var(--accent); }

  #logEntries { flex: 1; overflow-y: auto; }
  #logEntries::-webkit-scrollbar { width: 0; }

  .log-entry {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 0;
    opacity: 0; transform: translateX(-8px);
    transition: opacity 0.3s, transform 0.3s;
    color: var(--muted);
  }
  .log-entry.show { opacity: 1; transform: translateX(0); }
  .log-icon { font-size: 12px; }

  .log-entry .tag {
    padding: 1px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap;
  }

  .tag.mcalc   { background: #1a2f5c; color: #6aaeff; }
  .tag.rostar  { background: #1a3a2a; color: #2dcc8e; }
  .tag.afas    { background: #2a1a3a; color: #b47eff; }
  .tag.outlook { background: #0f2f50; color: #3ea8f5; }
  .tag.cos     { background: #3a2a0f; color: #ffb84d; }
  .tag.iss     { background: #1f2a45; color: #7aadff; }

  .highlight       { color: var(--accent); font-weight: 600; }
  .highlight-green { color: var(--green);  font-weight: 600; }
  .highlight-amber { color: var(--amber);  font-weight: 600; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="avatar">
    <div class="avatar-pulse"></div>
    Is
  </div>
  <div class="header-info">
    <h1>Issy</h1>
    <div class="status">
      <div class="status-dot"></div>
      Online · Smart FM AI Assistant
    </div>
  </div>
  <div class="header-right">
    <button class="sound-toggle on" id="soundToggle" onclick="toggleSound()">
      <span id="soundIcon">🔊</span> Sound on
    </button>
    <button class="demo-btn" id="demoBtn" onclick="handleDemoBtn()">
      <span class="btn-icon" id="demoBtnIcon">▶</span>
      <span id="demoBtnLabel">Start</span>
    </button>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chat"></div>

<!-- Input -->
<div class="input-area">
  <input class="input-box" id="inputBox" type="text" placeholder="Ask Issy anything..." readonly />
  <button class="send-btn">➤</button>
</div>

<!-- Action log -->
<div class="action-log">
  <div class="log-toolbar">
    <div class="log-label">Actions performed by Issy</div>
    <button class="save-log-btn">💾 Save log</button>
  </div>
  <div id="logEntries"></div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────────────────────
const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function getCtx() {
  if (!audioCtx) audioCtx = new AudioCtxClass();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBotResponse() {
  if (!soundEnabled) return;
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    const tone = (freq, vol, delay, decay) => {
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, now + delay);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, now + delay);
      g.gain.linearRampToValueAtTime(vol, now + delay + 0.005);
      g.gain.setTargetAtTime(0, now + delay + 0.005, decay * 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + delay); o.stop(now + delay + decay + 0.1);
    };
    tone(659,  0.12, 0,    0.6);
    tone(830,  0.09, 0,    0.5);
    tone(1047, 0.05, 0,    0.4);
    tone(1046, 0.10, 0.08, 0.5);
  } catch(e) {}
}

function playMessageSent() {
  if (!soundEnabled) return;
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(880, now);
    o.frequency.setValueAtTime(1100, now + 0.04);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.10, now + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 0.14);
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  btn.innerHTML = `<span id="soundIcon">${soundEnabled ? '🔊' : '🔇'}</span> Sound ${soundEnabled ? 'on' : 'off'}`;
  btn.className = 'sound-toggle' + (soundEnabled ? ' on' : '');
}

// ── Script ────────────────────────────────────────────────────────────────────
const script = [
  // STEP 1 — Issy initiates proactively (no user input — bot opens)
  {
    issyOpens: true,
    thinking: 0,
    issy: "Hey Tim, sorry to interrupt — do you have a quick moment? 🎉\n\nI've just received a <span class='highlight'>Change of Scope notification</span> for your site — and I have some great news! Is now a good time?",
    choices: ["✅  Yes, now is great!", "❌  Not now"],
    selectedChoice: 0,
    actions: [
      { icon: "📩", tag: "cos",   sys: "CoS",   label: "Change of Scope notification received · Site NL-0042" },
      { icon: "🔍", tag: "iss",   sys: "ISS",   label: "Contract record retrieved · Tim Bakker · Site Manager" }
    ]
  },
  // STEP 2 — Tim clicked Yes — no typing needed, message appears directly
  {
    user: "Yes, now is great!",
    skipType: true,
    thinking: 1000,
    issy: "Fantastic — and <span class='highlight-green'>congratulations Tim!</span> 🎉\n\nYour site has been <span class='highlight'>approved for an expansion of our catering service</span>. This is great news for the whole team!\n\nI want to make sure everything is ready from day one — the right people, right place, right time. Just a couple of quick questions:\n\n<span class='highlight'>How many people work at this location?</span> And what are the operating hours?",
    actions: [
      { icon: "📋", tag: "cos",   sys: "CoS",   label: "Scope change details loaded · Catering service expansion" },
      { icon: "🏢", tag: "iss",   sys: "ISS",   label: "Site profile opened · NL-0042 · Amsterdam South" }
    ]
  },
  // STEP 3 — Tim answers
  {
    user: "240 people, Monday to Friday, 7am to 6pm.",
    thinking: 1400,
    issy: "Perfect — leave the rest to me! 🚀\n\nI'm running the calculations in <span class='highlight'>MCalc</span> now and processing the Change of Scope in our contract system.",
    actions: [
      { icon: "🔢", tag: "mcalc", sys: "MCalc", label: "Contract calculation started · 240 FTE · Mon–Fri 07:00–18:00" },
      { icon: "📋", tag: "cos",   sys: "CoS",   label: "Change of Scope processed · Catering added to contract" },
      { icon: "💶", tag: "mcalc", sys: "MCalc", label: "Cost model generated · Catering service NL-0042" }
    ]
  },
  // STEP 4 — Staffing result
  {
    user: "Great, what does MCalc say?",
    thinking: 1600,
    issy: "MCalc is done. Based on <span class='highlight'>240 people on site</span>, the calculation recommends:\n\n<span class='highlight-green'>4 catering staff</span> to run this service smoothly within the contracted hours.\n\nNow let me build the schedule. I'm generating the roster based on your headcount, opening hours and occupancy patterns from similar locations.",
    actions: [
      { icon: "👥", tag: "mcalc", sys: "MCalc", label: "Staffing output: 4 FTE catering · 07:00–18:00" },
      { icon: "📊", tag: "mcalc", sys: "MCalc", label: "Benchmark applied · Similar restaurant locations NL" },
      { icon: "🗓️", tag: "rostar", sys: "Rostar", label: "Roster generation started · Week pattern calculated" }
    ]
  },
  // STEP 5 — Roster detail with Thu/Fri split
  {
    user: "Sounds good. What does the roster look like?",
    thinking: 1800,
    issy: "Here's the proposed weekly roster:\n\n<span class='highlight'>Mon – Wed:</span> 4 staff · Standard coverage\n<span class='highlight-amber'>Thu:</span> <span class='highlight-green'>5 staff</span> · Peak day based on data from similar locations\n<span class='highlight-amber'>Fri:</span> <span class='highlight-green'>2 staff</span> · Lighter footfall — scaled down accordingly\n\nShifts are spread <span class='highlight'>evenly across the week</span> and balanced per team member.\n\nThe rosters are now posted in <span class='highlight'>Rostar CAS</span> for your review. Once you give the green light, they'll be published automatically.",
    actions: [
      { icon: "📤", tag: "rostar", sys: "Rostar", label: "Rosters posted in Rostar CAS · Pending approval" },
      { icon: "📈", tag: "rostar", sys: "Rostar", label: "Peak pattern applied · Thu +1 FTE · Fri –2 FTE" },
      { icon: "⚖️", tag: "rostar", sys: "Rostar", label: "Shift balance verified · Equal hours per team member" }
    ]
  },
  // STEP 6 — AFAS check
  {
    user: "Perfect. Do we have the right people available?",
    thinking: 1500,
    issy: "I've already checked <span class='highlight'>AFAS</span> for available staff with a catering background and open hours this period.\n\nResult: <span class='highlight-green'>3 colleagues</span> with a catering background and available capacity have been identified and flagged as priority candidates for this roster.",
    actions: [
      { icon: "🔍", tag: "afas", sys: "AFAS", label: "Staff search executed · Catering background · Available hours" },
      { icon: "✅", tag: "afas", sys: "AFAS", label: "3 candidates matched · Flagged for roster assignment" },
      { icon: "📧", tag: "outlook", sys: "Outlook", label: "Candidate notification queued · Pending roster approval" }
    ]
  },
  // STEP 7 — Final approval
  {
    user: "Excellent. Let's approve and publish!",
    thinking: 1200,
    issy: "✅ <span class='highlight-green'>All done, Tim!</span>\n\nYour new catering service is fully set up:\n\n• Contract calculated & scope updated in <span class='highlight'>MCalc</span>\n• Rosters published via <span class='highlight'>Rostar CAS</span>\n• 3 candidates notified via <span class='highlight'>AFAS + Outlook</span>\n\nThe team is ready for day one. I'll keep you posted as confirmations come in. 👋\n\n<span style='color:var(--muted);font-size:12px'>Smarter planning. Faster starts. That's Issy.</span>",
    actions: [
      { icon: "🚀", tag: "rostar",  sys: "Rostar",  label: "Rosters published · Catering team notified" },
      { icon: "📧", tag: "outlook", sys: "Outlook",  label: "Confirmation sent · Tim Bakker + Account Manager" },
      { icon: "✅", tag: "cos",     sys: "CoS",      label: "Change of Scope finalised · NL-0042 · Catering live" }
    ]
  }
];

// ── State ─────────────────────────────────────────────────────────────────────
let demoState = 'idle';
let pauseResolve = null;
let abortDemo = false;

const chat = document.getElementById('chat');
const inputEl = document.getElementById('inputBox');
const logEntriesEl = document.getElementById('logEntries');

// ── Helpers ───────────────────────────────────────────────────────────────────
function pauseableSleep(ms) {
  return new Promise(resolve => {
    const step = 50;
    let elapsed = 0;
    function tick() {
      if (abortDemo) { resolve(); return; }
      if (demoState === 'paused') {
        pauseResolve = () => { pauseResolve = null; tick(); };
        return;
      }
      elapsed += step;
      if (elapsed >= ms) { resolve(); return; }
      setTimeout(tick, step);
    }
    tick();
  });
}

function addMessage(role, html, withChoices) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const ava = document.createElement('div');
  ava.className = 'msg-avatar';
  ava.textContent = role === 'issy' ? 'Is' : '👤';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html.replace(/\n/g, '<br>');

  if (withChoices) {
    const group = document.createElement('div');
    group.className = 'choice-group';
    withChoices.forEach((label, i) => {
      const chip = document.createElement('span');
      chip.className = 'choice-chip' + (i === 0 ? ' selected' : '');
      chip.textContent = label;
      group.appendChild(chip);
    });
    bub.appendChild(group);
  }

  wrap.appendChild(ava);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  requestAnimationFrame(() => setTimeout(() => wrap.classList.add('visible'), 20));
  return bub;
}

function showThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg issy visible';
  const ava = document.createElement('div');
  ava.className = 'msg-avatar'; ava.textContent = 'Is';
  const bub = document.createElement('div');
  bub.className = 'bubble thinking';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(ava); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function typeInput(text) {
  return new Promise(resolve => {
    inputEl.value = '';
    let i = 0;
    function next() {
      if (abortDemo) { resolve(); return; }
      if (demoState === 'paused') { pauseResolve = next; return; }
      if (i >= text.length) { resolve(); return; }
      inputEl.value += text[i++];
      setTimeout(next, 60 + Math.random() * 35);
    }
    next();
  });
}

function addLogEntry(entry) {
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-icon">${entry.icon}</span><span class="tag ${entry.tag}">${entry.sys}</span><span>${entry.label}</span>`;
  logEntriesEl.insertBefore(el, logEntriesEl.firstChild);
  setTimeout(() => el.classList.add('show'), 30);
}

// ── Demo control ──────────────────────────────────────────────────────────────
function updateDemoBtn(state) {
  const icon = document.getElementById('demoBtnIcon');
  const label = document.getElementById('demoBtnLabel');
  if (state === 'idle' || state === 'done') {
    icon.textContent = '▶'; label.textContent = demoState === 'done' ? 'Restart' : 'Start';
  } else if (state === 'running') {
    icon.textContent = '⏸'; label.textContent = 'Pause';
  } else if (state === 'paused') {
    icon.textContent = '▶'; label.textContent = 'Resume';
  }
}

function handleDemoBtn() {
  getCtx();
  if (demoState === 'idle' || demoState === 'done') {
    abortDemo = false;
    chat.innerHTML = '';
    logEntriesEl.innerHTML = '';
    inputEl.value = '';
    demoState = 'running';
    updateDemoBtn('running');
    runDemo().then(() => {
      demoState = 'done';
      updateDemoBtn('done');
    });
  } else if (demoState === 'running') {
    demoState = 'paused';
    updateDemoBtn('paused');
  } else if (demoState === 'paused') {
    demoState = 'running';
    updateDemoBtn('running');
    if (pauseResolve) { const r = pauseResolve; pauseResolve = null; r(); }
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
async function runDemo() {
  await pauseableSleep(600);

  for (const step of script) {
    if (abortDemo) return;

    if (step.issyOpens) {
      // Issy initiates without user typing
      const thinkEl = showThinking();
      await pauseableSleep(1200);
      if (abortDemo) return;
      thinkEl.remove();
      playBotResponse();
      const bub = addMessage('issy', step.issy, step.choices);
      await pauseableSleep(900);
      if (abortDemo) return;

      // Animate "Yes" chip: hover → click → selected
      const chips = bub.querySelectorAll('.choice-chip');
      if (chips.length > 0) {
        const yesChip = chips[0];
        // 1. Hover highlight
        yesChip.classList.add('hover');
        await pauseableSleep(500);
        if (abortDemo) return;
        // 2. Click press
        yesChip.classList.remove('hover');
        yesChip.classList.add('clicking');
        playMessageSent();
        await pauseableSleep(220);
        if (abortDemo) return;
        // 3. Settle into selected
        yesChip.classList.remove('clicking');
        yesChip.classList.add('selected');
        await pauseableSleep(350);
      }
    } else {
      // Normal: type user input (or skip if user just clicked a choice)
      if (!step.skipType) {
        await typeInput(step.user);
        await pauseableSleep(300);
        if (abortDemo) return;
      }
      playMessageSent();
      addMessage('user', step.user);
      inputEl.value = '';
      await pauseableSleep(500);
      if (abortDemo) return;
      const thinkEl = showThinking();
      await pauseableSleep(step.thinking);
      if (abortDemo) return;
      thinkEl.remove();
      playBotResponse();
      addMessage('issy', step.issy);
      await pauseableSleep(500);
    }

    if (abortDemo) return;

    // Action log entries
    for (const action of step.actions) {
      await pauseableSleep(280);
      if (abortDemo) return;
      addLogEntry(action);
    }

    await pauseableSleep(1800);
    if (abortDemo) return;
  }
}
